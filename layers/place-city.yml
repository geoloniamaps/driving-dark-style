id: place-city
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - city
layout:
  text-font:
    - Noto Sans CJK JP Bold
  text-size:
    stops:
      - - 5
        - 15
      - - 10
        - 22
  text-field: '{name}'
  text-max-width: 6
  text-padding: 30
  text-letter-spacing: 0.1
paint:
  text-color: '#e8f0f8'
  text-halo-width: 3.5
  text-halo-color: '#141c28'
